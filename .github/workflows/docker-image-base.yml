name: Build base image for armv5-homeassistant

concurrency: 
  group: my-workflow-${{ github.ref }}
  cancel-in-progress: true

on: 
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:  
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.2.1
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build and push the image
        run: |
          export HASS_RELEASE=$(jq -r 'map(select(.prerelease==false)) | first | .tag_name' <<< $(curl --silent https://api.github.com/repos/home-assistant/core/releases))
          export REQ_PYTHON=$(curl -s https://pypi.org/pypi/homeassistant/$HASS_RELEASE/json | jq -r '.info.requires_python | match("3\\.[0-9]+(\\.[0-9]+)?") | .string')

          docker buildx build --push \
            --tag rara64/armv5-debian-base:latest --label version="1.0.2" --label python_version=$REQ_PYTHON --build-arg PYTHON_VERSION=$REQ_PYTHON \
            --platform linux/arm/v5 -f base/Dockerfile --allow security.insecure --no-cache .
